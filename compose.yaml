services:
  keycloak-db:
    image: postgres:16
    container_name: ageix-keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - ageix-auth

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: ageix-keycloak
    restart: unless-stopped
    command:
      - start
      - --http-enabled=true
      - --hostname=${KEYCLOAK_HOSTNAME}
      - --proxy-headers=xforwarded
      # refresh_token is not in Keycloak's tokenParamNames set, so it's capped by the
      # "standard" OIDC param limit (4000 chars), not the 20000-char token-param limit.
      # The claude.ai connector's wildcard capability grant produces a much longer
      # refresh_token (~6700 chars), which Keycloak was silently truncating. Raise the
      # standard-param ceiling so it's accepted as-is (stopgap; see CLAUDE.md re: scoping
      # default_allowed_capabilities down instead of "*").
      - --spi-login-protocol--openid-connect--req-params-default-max-size=20000
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    depends_on:
      - keycloak-db
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - ageix-auth

volumes:
  keycloak_db_data:

networks:
  ageix-auth: